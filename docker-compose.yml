services:
  mangobi-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mangobi-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=https://demotokbud.mangoanywhere.com/production.service/
      - NUXT_PUBLIC_PLANNING_BASE=http://localhost:8080/api/v1/
    restart: unless-stopped
